<!DOCTYPE html>
<html lang="th">
<head>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">

                    <span class="text-gray-300 text-xl font-light">|</span>
                    <img src="https://hqloiijnyefhikmkmumk.supabase.co/storage/v1/object/sign/LOGO/Zoom-Logo.jpg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9iNmRlZTI0YS0wZWFhLTRkMTItYTMwNy01NDQ4NGFlNjM3YzciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMT0dPL1pvb20tTG9nby5qcGciLCJpYXQiOjE3Nzk0NDE2NDAsImV4cCI6MTc4MDMwNTY0MH0.gkfJcP_dMDj9QGKyKeBT5MW4ocV0mUBAuM-biUwafcE" alt="Zoom Logo" class="h-6 w-auto object-contain mt-1">
                </div>
                <div class="flex items-center w-full sm:w-auto overflow-x-auto no-scrollbar pb-1 sm:pb-0">
                    <nav class="flex space-x-2 mr-4">
                        <a href="index.html" class="text-gray-600 hover:text-blue-600 hover:bg-gray-50 px-3 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition">
                            <i class="fas fa-home mr-1"></i> หน้าหลัก
                        </a>
                        <a href="booking.html" class="bg-blue-50 text-blue-700 px-3 py-2 rounded-lg text-sm font-bold whitespace-nowrap transition">
                            <i class="fas fa-calendar-plus mr-1"></i> จองห้อง
                        </a>
                        <a href="booking-list.html" class="text-gray-600 hover:text-blue-600 hover:bg-gray-50 px-3 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition">
                            <i class="fas fa-list-alt mr-1"></i> รายการจอง
                        </a>
                        <a href="calendar.html" class="text-gray-600 hover:text-blue-600 hover:bg-gray-50 px-3 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition">

                    </nav>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto py-8 px-4">
        <div class="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-gray-200">
            <div class="mb-8 border-b border-gray-100 pb-4">
                <h2 class="text-2xl font-bold text-gray-800">จองห้องประชุม Zoom Meeting</h2>
                <p class="text-sm text-gray-500 mt-1">กรอกข้อมูลเพื่อสร้างห้องประชุมอัตโนมัติ</p>
            </div>

            <form id="bookingForm" class="space-y-6">
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">หัวข้อการประชุม</label>
                        <input type="text" id="topic" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">วันที่ประชุม</label>
                            <input type="date" id="meetingDate" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-700">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">เวลาเริ่ม</label>
                            <input type="time" id="startTime" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-700">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">เวลาสิ้นสุด</label>
                            <input type="time" id="endTime" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-700">
                        </div>
                    </div>
                </div>

                <div class="p-5 border border-gray-200 rounded-xl space-y-4">
                 <p class="text-sm font-bold text-gray-800 border-b border-gray-100 pb-2"><i class="fas fa-user-circle mr-2 text-gray-400"></i>ข้อมูลผู้จอง</p>
                 <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">ชื่อ-สกุล</label>
                        <input type="text" id="fullName" readonly class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-500 cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-blue-600 mb-1">อีเมลสำหรับรับลิงก์ (แก้ไขได้)</label>
                        <input type="email" id="userEmail" required class="w-full px-3 py-2 bg-white border border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">สำนัก</label>
                        <input type="text" id="department" readonly class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-500 cursor-not-allowed">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">เบอร์โทร</label>
                        <input type="text" id="phone" readonly class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-gray-500 cursor-not-allowed">
                    </div>
                </div>
            </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">สถานที่จัดประชุม (ห้อง)</label>
                        <input type="text" id="location" required placeholder="เช่น ห้องประชุม 1 อาคารวิทยบริการ" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="flex items-center gap-2 mt-4 p-3 border border-gray-200 rounded-lg">
                        <input type="checkbox" id="usePasscode" checked class="w-5 h-5 text-blue-600 border-gray-300 rounded">
                        <label class="text-sm font-bold text-gray-700">สร้าง Passcode อัตโนมัติจากระบบ</label>
                    </div>

                    <p class="text-xs text-gray-500 font-medium">* หมายเหตุ: ระบบสามารถสร้างห้อง Zoom ในช่วงเวลาเดียวกันได้เพียง 2 ห้องเท่านั้น</p>
                </div>

                <div id="alertBox" class="hidden p-3 rounded-lg text-sm font-bold mt-4 text-center border"></div>
                
                <button type="submit" id="submitBtn" class="w-full mt-6 bg-blue-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-blue-700 transition duration-200">
                    ยืนยันการจองห้องประชุม
                </button>
            </form>
        </div>
    </main>

    <footer class="py-8 border-t border-gray-200 text-center mt-auto">
    <p class="font-bold text-blue-700 text-lg">ระบบจองห้องประชุมออนไลน์ Zoom &copy; 2026</p>
    <p class="text-gray-500 text-sm mt-1">งานเทคโนโลยีสารสนเทศ วิทยาลัยชุมชนสมุทรสาคร</p>
</footer>

    <script>
        const SUPABASE_URL = 'https://hqloiijnyefhikmkmumk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxbG9paWpueWVmaGlrbWttdW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNDU5ODMsImV4cCI6MjA5NDkyMTk4M30.jgpU-av5u3VMYx5El6tgKej8NuunB9zsb0Vdb93j_Qw';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUserId = null;

        async function loadUserProfile() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUserId = session.user.id;
            
            document.getElementById('userEmail').value = session.user.email;
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', currentUserId).single();
            if (profile) {
                document.getElementById('fullName').value = profile.full_name || 'ไม่ได้ระบุ';
                document.getElementById('department').value = profile.department || 'ไม่ได้ระบุ';
                document.getElementById('phone').value = profile.phone || 'ไม่ได้ระบุ';
            }
        }
        loadUserProfile();

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังสร้างห้อง Zoom...';
            btn.disabled = true;
            btn.classList.add('opacity-70');

            const dateStr = document.getElementById('meetingDate').value;
            const startStr = document.getElementById('startTime').value;
            const endStr = document.getElementById('endTime').value;
            const startDateTime = new Date(`${dateStr}T${startStr}`);
            const endDateTime = new Date(`${dateStr}T${endStr}`);
            const durationMinutes = (endDateTime - startDateTime) / 60000;

            const payload = {
                user_id: currentUserId,
                topic: document.getElementById('topic').value,
                meeting_date: dateStr,
                start_time: startStr,
                end_time: endStr,
                duration: durationMinutes,
                location: document.getElementById('location').value,
                use_passcode: document.getElementById('usePasscode').checked,
                send_to_email: document.getElementById('userEmail').value 
            };

            try {
                const { data, error } = await supabaseClient.functions.invoke('create-zoom-meeting', { body: payload });
                if (error) throw error;
                if (data.error) throw new Error(data.error);

                alertBox.className = 'p-3 rounded-lg text-sm font-bold mt-4 bg-blue-50 text-blue-700 border-blue-200 block border text-center';
                alertBox.innerText = 'จองห้องประชุมสำเร็จ! กำลังพากลับไปหน้าหลัก...';
                
                setTimeout(() => window.location.href = 'index.html', 2000);

            } catch (err) {
                alertBox.className = 'p-3 rounded-lg text-sm font-bold mt-4 bg-gray-50 text-gray-700 border-gray-300 block border text-center';
                alertBox.innerText = `เกิดข้อผิดพลาด: ${err.message}`;
                btn.innerText = 'ยืนยันการจองห้องประชุม';
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        });
    </script>
</body>
</html>
