    <script>
        const SUPABASE_URL = 'https://hqloiijnyefhikmkmumk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxbG9paWpueWVmaGlrbWttdW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNDU5ODMsImV4cCI6MjA5NDkyMTk4M30.jgpU-av5u3VMYx5El6tgKej8NuunB9zsb0Vdb93j_Qw';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allBookings = []; 
        let currentUserId = null; 

        document.addEventListener('DOMContentLoaded', async function() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userGreeting').innerText = `ผู้ใช้งาน: ${session.user.email}`;
            currentUserId = session.user.id; 

            await loadBookings();

            document.getElementById('searchInput').addEventListener('input', renderTable);
            document.getElementById('timeFilter').addEventListener('change', renderTable);
        });

        async function loadBookings() {
            try {
                const { data, error } = await supabaseClient
                    .from('zoom_bookings')
                    .select('*, profiles(full_name, email)')
                    .eq('user_id', currentUserId) 
                    .order('meeting_date', { ascending: false }) 
                    .order('start_time', { ascending: false });

                if (error) throw error;
                allBookings = data || [];
                renderTable(); 

            } catch (err) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="text-center text-gray-500 py-8">เกิดข้อผิดพลาดในการดึงข้อมูล</td></tr>`;
            }
        }

        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const noDataMessage = document.getElementById('noDataMessage');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterType = document.getElementById('timeFilter').value;

            const today = new Date();
            const todayStr = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = new Date(tomorrow.getTime() - (tomorrow.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const past7Date = new Date(today);
            past7Date.setDate(today.getDate() - 7);
            const past7Str = new Date(past7Date.getTime() - (past7Date.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
            const past30Date = new Date(today);
            past30Date.setDate(today.getDate() - 30);
            const past30Str = new Date(past30Date.getTime() - (past30Date.getTimezoneOffset() * 60000)).toISOString().split('T')[0];

            const filteredData = allBookings.filter(item => {
                const topic = (item.topic || '').toLowerCase();
                const name = (item.profiles?.full_name || '').toLowerCase();
                const email = (item.profiles?.email || '').toLowerCase();
                const matchSearch = topic.includes(searchTerm) || name.includes(searchTerm) || email.includes(searchTerm);
                const mDate = item.meeting_date;
                let matchDate = true;
                
                if (filterType === 'today') matchDate = (mDate === todayStr);
                else if (filterType === 'tomorrow') matchDate = (mDate === tomorrowStr);
                else if (filterType === 'last7') matchDate = (mDate >= past7Str && mDate <= todayStr);
                else if (filterType === 'last30') matchDate = (mDate >= past30Str && mDate <= todayStr);

                return matchSearch && matchDate;
            });

            tableBody.innerHTML = '';

            if (filteredData.length === 0) {
                tableBody.parentElement.classList.add('hidden');
                noDataMessage.classList.remove('hidden');
            } else {
                tableBody.parentElement.classList.remove('hidden');
                noDataMessage.classList.add('hidden');

                filteredData.forEach((item, index) => {
                    
                    const statusBadge = item.status === 'success' 
                        ? `<span class="bg-emerald-100 text-emerald-700 text-xs font-bold px-3 py-1.5 rounded-full border border-emerald-200 shadow-sm"><i class="fas fa-check-circle mr-1"></i>สำเร็จ</span>`
                        : `<span class="bg-rose-100 text-rose-700 text-xs font-bold px-3 py-1.5 rounded-full border border-rose-200 shadow-sm"><i class="fas fa-times-circle mr-1"></i>ยกเลิก/ล้มเหลว</span>`;

                    const linkBtn = item.zoom_join_url 
                        ? `<a href="${item.zoom_join_url}" target="_blank" class="inline-flex items-center justify-center gap-1.5 text-white font-bold bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 px-4 py-2 rounded-xl shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition duration-200 w-full md:w-auto"><i class="fas fa-video"></i> เข้าร่วม</a>`
                        : `<span class="inline-flex items-center justify-center text-gray-400 bg-gray-50 border border-gray-200 px-4 py-2 rounded-xl w-full md:w-auto">-</span>`;

                    const detailsJson = encodeURIComponent(JSON.stringify(item));

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50/30 transition-colors";
                    tr.innerHTML = `
                        <td class="px-4 py-5 font-bold text-gray-800">${index + 1}</td>
                        <td class="px-4 py-5 font-bold text-gray-800 max-w-[200px] truncate" title="${item.topic}">${item.topic}</td>
                        <td class="px-4 py-5 whitespace-nowrap text-gray-700">
                            <div class="flex items-center gap-2 mb-1"><i class="far fa-calendar-alt text-blue-500"></i> ${item.meeting_date}</div>
                            <span class="text-xs text-gray-500 font-bold ml-5"><i class="far fa-clock text-gray-400"></i> ${item.start_time.substring(0,5)} - ${item.end_time.substring(0,5)} น.</span>
                        </td>
                        <td class="px-4 py-5">
                            <div class="font-mono text-indigo-600 font-bold bg-indigo-50 inline-block px-2 py-1 rounded border border-indigo-100">${item.zoom_meeting_id || '-'}</div>
                            <div class="text-xs text-gray-500 font-mono mt-2 flex items-center gap-1"><i class="fas fa-key text-gray-400"></i> ${item.zoom_passcode || '-'}</div>
                        </td>
                        <td class="px-4 py-5 text-center">${linkBtn}</td>
                        <td class="px-4 py-5 text-center">${statusBadge}</td>
                        <td class="px-4 py-5 text-center">
                            <div class="flex justify-center items-center gap-2">
                                <button onclick="showDetails('${detailsJson}')" class="text-sky-600 hover:text-white bg-sky-50 border border-sky-200 hover:bg-sky-500 rounded-xl px-3 py-2 text-sm shadow-sm transform hover:-translate-y-0.5 transition duration-200" title="รายละเอียด">
                                    <i class="fas fa-info-circle"></i>
                                </button>
                                <button onclick="downloadSinglePDF('${detailsJson}', this)" class="text-rose-600 hover:text-white bg-rose-50 border border-rose-200 hover:bg-rose-500 rounded-xl px-3 py-2 text-sm shadow-sm transform hover:-translate-y-0.5 transition duration-200" title="ดาวน์โหลด PDF">
                                    <i class="fas fa-file-pdf"></i>
                                </button>
                                <button onclick="getRecording('${item.zoom_meeting_id || ''}', this)" class="text-purple-600 hover:text-white bg-purple-50 border border-purple-200 hover:bg-purple-600 rounded-xl px-3 py-2 text-sm shadow-sm transform hover:-translate-y-0.5 transition duration-200" title="ดาวน์โหลดวีดีโอ">
                                    <i class="fas fa-cloud-download-alt"></i>
                                </button>
                                <button onclick="deleteBooking('${item.id}', '${item.zoom_meeting_id || ''}')" class="text-red-600 hover:text-white bg-red-50 border border-red-200 hover:bg-red-600 rounded-xl px-3 py-2 text-sm shadow-sm transform hover:-translate-y-0.5 transition duration-200" title="ลบข้อมูล">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            }
        }

        function showDetails(encodedJson) {
            const item = JSON.parse(decodeURIComponent(encodedJson));
            const name = item.profiles?.full_name || 'ไม่ทราบชื่อ';
            const email = item.profiles?.email || 'ไม่มีอีเมล';
            alert(`📝 รายละเอียดการจอง\n\n📌 หัวข้อ: ${item.topic}\n👤 ผู้จอง: ${name}\n📅 วันที่: ${item.meeting_date}\n⏰ เวลา: ${item.start_time.substring(0,5)} - ${item.end_time.substring(0,5)} น.\n📍 สถานที่: ${item.location || '-'}\n\n🔑 ID: ${item.zoom_meeting_id || '-'}\n🔒 Passcode: ${item.zoom_passcode || '-'}`);
        }

        // ฟังก์ชันดึงลิงก์บันทึกวีดีโอ Zoom
        async function getRecording(zoomMeetingId, btnElement) {
            if (!zoomMeetingId || zoomMeetingId === '-') {
                alert("❌ ไม่มีข้อมูล Meeting ID ไม่สามารถดึงวีดีโอได้");
                return;
            }

            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btnElement.disabled = true;

            try {
                const { data, error } = await supabaseClient.functions.invoke('get-zoom-recording', { 
                    body: { zoom_meeting_id: zoomMeetingId } 
                });
                
                if (error) throw error;
                if (data && data.error) throw new Error(data.error);

                let msg = `🎬 ไฟล์บันทึกวีดีโอพร้อมใช้งานแล้ว!\n\n🔗 ลิงก์: ${data.share_url}`;
                if (data.password) {
                    msg += `\n🔑 รหัสผ่าน (Passcode): ${data.password}`;
                }
                msg += `\n\n* กดปุ่ม OK เพื่อเปิดหน้าดาวน์โหลดวีดีโอ`;

                if(confirm(msg)) {
                    window.open(data.share_url, '_blank');
                }

            } catch (err) {
                alert("❌ ไม่สามารถดึงไฟล์บันทึกได้:\n" + err.message);
            } finally {
                btnElement.innerHTML = originalHTML;
                btnElement.disabled = false;
            }
        }

        async function deleteBooking(bookingId, zoomMeetingId) {
            if (!confirm(`⚠️ คุณแน่ใจหรือไม่ว่าต้องการลบรายการจองนี้?\n(ระบบจะทำการลบห้องในโปรแกรม Zoom ออกด้วย)`)) return;
            
            try {
                const userGreetingEl = document.getElementById('userGreeting');
                const originalGreeting = userGreetingEl.innerText;
                userGreetingEl.innerHTML = '<i class="fas fa-spinner fa-spin text-blue-500 mr-2"></i> กำลังลบข้อมูลและห้อง Zoom...';

                const { data, error } = await supabaseClient.functions.invoke('delete-zoom-meeting', { 
                    body: { 
                        booking_id: bookingId,
                        zoom_meeting_id: zoomMeetingId 
                    } 
                });
                
                if (error) throw error;
                if (data && data.error) throw new Error(data.error);

                alert('✅ ลบรายการและห้อง Zoom สำเร็จ!');
                await loadBookings();
                
                userGreetingEl.innerText = originalGreeting;
                
            } catch (err) {
                alert("❌ ลบรายการไม่สำเร็จ: " + err.message);
                document.getElementById('userGreeting').innerText = `เกิดข้อผิดพลาดในการลบข้อมูล`;
            }
        }

        async function downloadSinglePDF(encodedJson, btnElement) {
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btnElement.disabled = true;

            try {
                const item = JSON.parse(decodeURIComponent(encodedJson));
                const name = item.profiles?.full_name || 'ไม่ทราบชื่อ';
                const email = item.profiles?.email || 'ไม่มีอีเมล';
                const statusStr = item.status === 'success' ? 'สำเร็จ' : 'ยกเลิก/ล้มเหลว';
                const joinUrl = item.zoom_join_url || '-';

                let qrCodeHtml = '';
                if (joinUrl !== '-') {
                    const qr = new QRious({ value: joinUrl, size: 400, level: 'H' });
                    qrCodeHtml = `
                        <tr>
                            <td colspan="2" style="text-align: center; padding-top: 40px;">
                                <img src="${qr.toDataURL()}" alt="QR Code" style="width: 140px; height: 140px; border: 1px solid #e5e7eb; border-radius: 12px; padding: 8px; background-color: white; display: inline-block;">
                                <div style="font-size: 15px; color: #6b7280; margin-top: 12px; font-weight: bold;">(สแกนเพื่อเข้าประชุม)</div>
                            </td>
                        </tr>
                    `;
                }

                const htmlContent = `
                    <div style="font-family: 'Sarabun', sans-serif; color: #1f2937; background-color: #ffffff; padding: 10px;">
                        <div style="text-align: center; border-bottom: 2px solid #2563eb; padding-bottom: 20px; margin-bottom: 30px;">
                            <img src="https://hqloiijnyefhikmkmumk.supabase.co/storage/v1/object/sign/LOGO/logo.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9iNmRlZTI0YS0wZWFhLTRkMTItYTMwNy01NDQ4NGFlNjM3YzciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMT0dPL2xvZ28ucG5nIiwiaWF0IjoxNzc5NDU2MDk0LCJleHAiOjIwOTQ4MTYwOTR9.c5D729pafJ1HCUCerZcRwuOvIq8m2BxudOji4Hv-2Cs" alt="Logo" style="display: block; margin: 0 auto 20px auto; height: 140px; width: auto;">
                            <h2 style="font-size: 24px; font-weight: bold; margin: 0; color: #1f2937;">รายละเอียดการจองห้องประชุม Zoom</h2>
                        </div>
                        <div style="padding: 30px; border: 1px solid #e5e7eb; border-radius: 8px; background-color: #ffffff;">
                            <h3 style="font-size: 20px; font-weight: bold; margin: 0 0 20px 0; color: #2563eb;">หัวข้อ: ${item.topic || '-'}</h3>
                            <table style="width: 100%; font-size: 16px; line-height: 2; border-collapse: collapse;">
                                <tr><td style="width: 160px; font-weight: bold; color: #4b5563;">ผู้จอง:</td><td>${name} (${email})</td></tr>
                                <tr><td style="font-weight: bold; color: #4b5563;">วันที่และเวลา:</td><td>${item.meeting_date} | เวลา: ${item.start_time ? item.start_time.substring(0,5) : '-'} - ${item.end_time ? item.end_time.substring(0,5) : '-'} น.</td></tr>
                                <tr><td style="font-weight: bold; color: #4b5563;">สถานที่:</td><td>${item.location || '-'}</td></tr>
                                <tr><td style="font-weight: bold; color: #4b5563;">Meeting ID:</td><td style="font-family: monospace; font-size: 20px; color: #2563eb; font-weight: bold;">${item.zoom_meeting_id || '-'}</td></tr>
                                <tr><td style="font-weight: bold; color: #4b5563;">Passcode:</td><td style="font-family: monospace; font-size: 20px;">${item.zoom_passcode || '-'}</td></tr>
                                <tr><td style="font-weight: bold; color: #4b5563;">ลิงก์เข้าห้อง:</td><td style="word-break: break-all;">${joinUrl !== '-' ? `<a href="${joinUrl}" style="color: #2563eb; text-decoration: underline;">${joinUrl}</a>` : '-'}</td></tr>
                                ${qrCodeHtml}
                            </table>
                        </div>
                    </div>
                `;

                const opt = { margin: 0.5, filename: `Zoom-${item.topic || 'Booking'}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
                await html2pdf().set(opt).from(htmlContent).save();

            } catch (err) {
                alert("เกิดข้อผิดพลาดในการสร้างไฟล์ PDF");
            } finally {
                btnElement.innerHTML = originalHTML;
                btnElement.disabled = false;
            }
        }
    </script>
</body>
</html>
