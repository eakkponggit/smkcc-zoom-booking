<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบจองห้องประชุม Zoom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col font-sans">
    
    <header class="py-6 px-4">
        <div class="flex items-center justify-center gap-4">
            <img src="https://hqloiijnyefhikmkmumk.supabase.co/storage/v1/object/sign/LOGO/logo.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9iNmRlZTI0YS0wZWFhLTRkMTItYTMwNy01NDQ4NGFlNjM3YzciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMT0dPL2xvZ28ucG5nIiwiaWF0IjoxNzc5NDQxNTg5LCJleHAiOjE3ODAzMDU1ODl9.NiHKN2gdafcjONfM0woI38nqRBK0jUojtbvcSjDno1M" alt="SMKCC Logo" class="h-14 w-auto object-contain">
            <span class="text-gray-300 text-2xl font-light">|</span>
            <img src="https://hqloiijnyefhikmkmumk.supabase.co/storage/v1/object/sign/LOGO/Zoom-Logo.jpg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9iNmRlZTI0YS0wZWFhLTRkMTItYTMwNy01NDQ4NGFlNjM3YzciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMT0dPL1pvb20tTG9nby5qcGciLCJpYXQiOjE3Nzk0NDE2NDAsImV4cCI6MT8wMzA1NjQwfQ.gkfJcP_dMDj9QGKyKeBT5MW4ocV0mUBAuM-biUwafcE" alt="Zoom Logo" class="h-8 w-auto object-contain mt-2">
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 md:p-10 rounded-2xl shadow-lg border border-gray-100 w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-blue-700 mb-2">เข้าสู่ระบบ</h1>
                <p class="text-gray-500">เพื่อจัดการห้องประชุมออนไลน์</p>
            </div>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">อีเมล (Email)</label>
                    <input type="email" id="email" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                           placeholder="ชื่อผู้ใช้งาน@smkcc.ac.th">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">รหัสผ่าน (Password)</label>
                    <input type="password" id="password" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                           placeholder="••••••••">
                </div>
                
                <div id="errorMessage" class="text-red-500 text-sm text-center hidden font-medium">
                    อีเมลหรือรหัสผ่านไม่ถูกต้อง!
                </div>
                
                <button type="submit" id="loginBtn" 
                        class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                    เข้าสู่ระบบ
                </button>

                <div class="text-center pt-2">
                    <a href="https://hqloiijnyefhikmkmumk.supabase.co/storage/v1/object/public/user-manual/user-manual.pdf.pdf" 
                       target="_blank" 
                       class="inline-flex items-center text-sm font-bold text-blue-600 hover:text-blue-800 hover:underline transition gap-2">
                        <i class="fas fa-book"></i> คู่มือการใช้งานระบบ (PDF)
                    </a>
                </div>
            </form>
        </div>
    </main>

    <footer class="py-8 border-t border-gray-200 text-center mt-auto">
        <p class="font-bold text-blue-700 text-lg">ระบบจองห้องประชุมออนไลน์ Zoom &copy; 2026</p>
        <p class="text-gray-500 text-sm mt-1">งานเทคโนโลยีสารสนเทศ วิทยาลัยชุมชนสมุทรสาคร</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://hqloiijnyefhikmkmumk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxbG9paWpueWVmaGlrbWttdW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNDU5ODMsImV4cCI6MjA5NDkyMTk4M30.jgpU-av5u3VMYx5El6tgKej8NuunB9zsb0Vdb93j_Qw';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        checkSession();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');

            btn.innerText = 'กำลังตรวจสอบข้อมูล...';
            btn.disabled = true;
            btn.classList.add('opacity-70');
            errorMsg.classList.add('hidden');

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.innerText = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง โปรดลองอีกครั้ง';
                errorMsg.classList.remove('hidden');
                btn.innerText = 'เข้าสู่ระบบ';
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
