    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* -------------------------------------------
           ปรับแต่งปฏิทินให้เข้ากับธีมสีขาวและจัดระยะห่าง
        ---------------------------------------------- */
        .fc { font-family: 'Sarabun', sans-serif; color: #374151; }
        .fc-event { cursor: pointer; border-radius: 6px; padding: 4px 8px; border: none; font-weight: 600; font-size: 0.85em; }
        
        /* ขนาดตัวอักษรของหัวข้อเดือน */
        .fc-toolbar-title { font-size: 1.5rem !important; font-weight: 700 !important; color: #1f2937; margin: 0 1rem !important; }
        
        /* จัดการ Layout ของ Toolbar ด้านบน */
        .fc-header-toolbar { 
            flex-wrap: wrap; 
            gap: 1.5rem; 
            margin-bottom: 2rem !important; 
        }
        
        /* จัดกลุ่มปุ่มแต่ละโซน (ซ้าย กลาง ขวา) */
        .fc-toolbar-chunk { 
            display: flex; 
            align-items: center; 
            gap: 0.75rem; /* ระยะห่างระหว่างกลุ่มปุ่ม */
            flex-wrap: wrap;
        }
        
        /* แยกปุ่มที่ติดกันให้มีระยะห่าง */
        .fc-button-group { 
            display: flex; 
            gap: 0.5rem; /* ระยะห่างระหว่างปุ่มภายในกลุ่มเดียวกัน */
        }
        
        /* ปรับแต่งดีไซน์ปุ่ม (ความโค้ง, เงา, ระยะขอบ) */
        .fc-button { 
            padding: 0.5rem 1.25rem !important; 
            font-weight: 600 !important;
            font-family: 'Sarabun', sans-serif !important;
            border-radius: 10px !important; /* แยกความโค้งมนให้เป็นอิสระต่อกัน */
            transition: all 0.2s ease !important;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05) !important;
            text-transform: capitalize;
        }
        
        /* สีปุ่มปกติ (พื้นขาว ขอบเทาอ่อน) */
        .fc-button-primary { 
            background-color: #ffffff !important; 
            border: 1px solid #e5e7eb !important; 
            color: #4b5563 !important; 
        }
        
        /* สีปุ่มเมื่อนำเมาส์ไปชี้ */
        .fc-button-primary:hover { 
            background-color: #f8fafc !important; 
            color: #2563eb !important; 
            border-color: #bfdbfe !important;
        }
        
        /* สีปุ่มเมื่อกำลังเลือกอยู่ (Active มุมมองปัจจุบัน) */
        .fc-button-active { 
            background-color: #eff6ff !important; 
            color: #1d4ed8 !important; 
            border-color: #93c5fd !important;
            box-shadow: 0 1px 3px 0 rgba(37, 99, 235, 0.1) !important;
        }

        /* ปุ่มที่ไม่สามารถกดได้ (Disabled) */
        .fc-button-primary:disabled {
            background-color: #f9fafb !important;
            color: #9ca3af !important;
            border-color: #f3f4f6 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
        
        /* ส่วนกรอบและสีพื้นหลังของตารางปฏิทิน */
        .fc-theme-standard td, .fc-theme-standard th { border-color: #e5e7eb; }
        .fc-col-header-cell { padding: 12px 0; background-color: #f8fafc; border-bottom: 2px solid #e2e8f0 !important; }
        .fc-day-today { background-color: #eff6ff !important; } /* ไฮไลต์ช่องของวันนี้ */
    </style>
</head>

    <script>
        const SUPABASE_URL = 'https://hqloiijnyefhikmkmumk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxbG9paWpueWVmaGlrbWttdW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNDU5ODMsImV4cCI6MjA5NDkyMTk4M30.jgpU-av5u3VMYx5El6tgKej8NuunB9zsb0Vdb93j_Qw';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.addEventListener('DOMContentLoaded', async function() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            const calendarEl = document.getElementById('calendar');
            
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th', 
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                buttonText: {
                    today: 'วันนี้',
                    month: 'เดือน',
                    week: 'สัปดาห์',
                    day: 'วัน'
                },
                events: [], 
                eventClick: function(info) {
                    const props = info.event.extendedProps;
                    const startTime = info.event.start.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                    const endTime = info.event.end ? info.event.end.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) : 'ไม่ระบุ';
                    
                    alert(`📌 หัวข้อ: ${info.event.title}\n⏰ เวลา: ${startTime} - ${endTime} น.\n👤 ผู้จอง: ${props.booker_name}`);
                }
            });
            
            calendar.render();

            async function loadCalendarEvents() {
                try {
                    const { data, error } = await supabaseClient.from('zoom_bookings').select('*, profiles(full_name)');
                    if (error) throw error;
                    if (!data || data.length === 0) return;

                    const events = data.map(booking => {
                        if (!booking.start_time || !booking.end_time || !booking.meeting_date) return null;
                        const startISO = `${booking.meeting_date}T${booking.start_time.substring(0, 5)}:00`;
                        const endISO = `${booking.meeting_date}T${booking.end_time.substring(0, 5)}:00`;

                        return {
                            id: booking.id,
                            title: booking.topic,
                            start: startISO,
                            end: endISO,
                            backgroundColor: '#2563eb', 
                            borderColor: '#2563eb',
                            textColor: '#ffffff',
                            extendedProps: {
                                booker_name: booking.profiles?.full_name || 'ไม่ทราบชื่อ'
                            }
                        };
                    }).filter(event => event !== null); 

                    calendar.removeAllEvents();
                    calendar.addEventSource(events);
                } catch (err) {
                    console.error('เกิดข้อผิดพลาด:', err.message);
                }
            }

            loadCalendarEvents();
        });
    </script>
</body>
